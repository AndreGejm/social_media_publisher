# Default app ACL for the desktop renderer.
# This scopes frontend IPC to the audited Tauri command surface only.
[default]
description = "Default app permissions for the desktop publisher UI."
permissions = [
  "allow-load-spec",
  "allow-plan-release",
  "allow-execute-release",
  "allow-list-history",
  "allow-get-report",
  "allow-analyze-audio-file",
  "allow-analyze-and-persist-release-track",
  "allow-get-release-track-analysis",
  "allow-init-exclusive-device",
  "allow-set-volume",
  "allow-set-playback-queue",
  "allow-push-track-change-request",
  "allow-set-playback-playing",
  "allow-seek-playback-ratio",
  "allow-toggle-queue-visibility",
  "allow-get-playback-context",
  "allow-get-playback-decode-error",
  "allow-qc-get-feature-flags",
  "allow-qc-list-codec-profiles",
  "allow-qc-prepare-preview-session",
  "allow-qc-get-preview-session",
  "allow-qc-set-preview-variant",
  "allow-qc-reveal-blind-x",
  "allow-qc-get-active-preview-media",
  "allow-qc-start-batch-export",
  "allow-qc-get-batch-export-job-status",
  "allow-catalog-import-files",
  "allow-catalog-list-tracks",
  "allow-catalog-get-track",
  "allow-publisher-create-draft-from-track",
  "allow-catalog-update-track-metadata",
  "allow-catalog-add-library-root",
  "allow-catalog-list-library-roots",
  "allow-catalog-remove-library-root",
  "allow-catalog-reset-library-data",
  "allow-catalog-scan-root",
  "allow-catalog-get-ingest-job",
  "allow-catalog-cancel-ingest-job",
]
