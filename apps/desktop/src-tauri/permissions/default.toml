# Default app ACL for the desktop renderer.
# This scopes frontend IPC to the audited Tauri command surface only.
[default]
description = "Default app permissions for the desktop publisher UI."
permissions = [
  "allow-load-spec",
  "allow-plan-release",
  "allow-execute-release",
  "allow-list-history",
  "allow-get-report",
  "allow-analyze-audio-file",
  "allow-analyze-and-persist-release-track",
  "allow-get-release-track-analysis",
  "allow-init-exclusive-device",
  "allow-set-volume",
  "allow-set-playback-queue",
  "allow-push-track-change-request",
  "allow-set-playback-playing",
  "allow-seek-playback-ratio",
  "allow-toggle-queue-visibility",
  "allow-get-playback-context",
  "allow-get-playback-decode-error",
  "allow-video-render-validate",
  "allow-video-render-start",
  "allow-video-render-status",
  "allow-video-render-cancel",
  "allow-video-render-result",
  "allow-video-render-get-environment-diagnostics",
  "allow-video-render-check-source-path",
  "allow-video-render-open-output-folder",
  "allow-qc-get-feature-flags",
  "allow-qc-list-codec-profiles",
  "allow-qc-prepare-preview-session",
  "allow-qc-get-preview-session",
  "allow-qc-set-preview-variant",
  "allow-qc-reveal-blind-x",
  "allow-qc-get-active-preview-media",
  "allow-qc-start-batch-export",
  "allow-qc-get-batch-export-job-status",
  "allow-catalog-import-files",
  "allow-catalog-list-tracks",
  "allow-catalog-get-track",
  "allow-publisher-create-draft-from-track",
  "allow-catalog-update-track-metadata",
  "allow-catalog-add-library-root",
  "allow-catalog-list-library-roots",
  "allow-catalog-remove-library-root",
  "allow-catalog-reset-library-data",
  "allow-catalog-scan-root",
  "allow-catalog-get-ingest-job",
  "allow-catalog-cancel-ingest-job",
]

[[permission]]
identifier = "allow-video-render-validate"
description = "Enables the video_render_validate command without any pre-configured scope."
commands.allow = ["video_render_validate"]

[[permission]]
identifier = "allow-video-render-start"
description = "Enables the video_render_start command without any pre-configured scope."
commands.allow = ["video_render_start"]

[[permission]]
identifier = "allow-video-render-status"
description = "Enables the video_render_status command without any pre-configured scope."
commands.allow = ["video_render_status"]

[[permission]]
identifier = "allow-video-render-cancel"
description = "Enables the video_render_cancel command without any pre-configured scope."
commands.allow = ["video_render_cancel"]

[[permission]]
identifier = "allow-video-render-result"
description = "Enables the video_render_result command without any pre-configured scope."
commands.allow = ["video_render_result"]
[[permission]]
identifier = "allow-video-render-get-environment-diagnostics"
description = "Enables the video_render_get_environment_diagnostics command without any pre-configured scope."
commands.allow = ["video_render_get_environment_diagnostics"]

[[permission]]
identifier = "allow-video-render-check-source-path"
description = "Enables the video_render_check_source_path command without any pre-configured scope."
commands.allow = ["video_render_check_source_path"]

[[permission]]
identifier = "allow-video-render-open-output-folder"
description = "Enables the video_render_open_output_folder command without any pre-configured scope."
commands.allow = ["video_render_open_output_folder"]
