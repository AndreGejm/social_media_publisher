[package]
name = "release-publisher-desktop"
version = "0.1.0"
edition = "2021"

[lib]
name = "release_publisher_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tauri = { version = "2", features = [] }
release-publisher-core = { path = "../../../crates/core" }
release-publisher-db = { path = "../../../crates/db" }
release-publisher-mock-connector = { path = "../../../crates/connectors/mock" }

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dev-dependencies]
tempfile = "3"
