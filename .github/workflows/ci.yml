name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm install
      - name: Frontend typecheck
        run: npm run typecheck --workspace apps/desktop
      - name: Frontend lint
        run: npm run lint --workspace apps/desktop
      - name: Frontend unit tests
        run: npm run test --workspace apps/desktop -- --run
      - name: Build web UI
        run: npm run build --workspace apps/desktop
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Playwright smoke
        run: npm run test:e2e

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt check
        run: cargo fmt --all -- --check
      - name: clippy (warnings as errors)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run core tests
        run: cargo test -p release-publisher-core
      - name: Run workspace tests
        run: cargo test --workspace
